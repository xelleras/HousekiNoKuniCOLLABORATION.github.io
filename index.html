<div id="sessionStats" style="
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    z-index: 9999;
    pointer-events: none;
    backdrop-filter: blur(5px);
    border: 1px solid #0f0;
    box-shadow: 0 0 10px rgba(0,255,0,0.3);
">
    Загрузка...
</div>

<script>
(function() {
    const STORAGE_KEY = 'rpg_session_stats';
    const sessionStart = Date.now();

    function formatTime(seconds) {
        if (seconds === undefined || seconds === null || isNaN(seconds)) {
            return '0 сек';
        }
        
        const days = Math.floor(seconds / 86400);
        const hours = Math.floor((seconds % 86400) / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        
        const parts = [];
        
        if (days > 0) {
            parts.push(`${days} ${declension(days, 'день', 'дня', 'дней')}`);
        }
        if (hours > 0) {
            parts.push(`${hours} ${declension(hours, 'час', 'часа', 'часов')}`);
        }
        if (minutes > 0 && days === 0) { 
            parts.push(`${minutes} ${declension(minutes, 'минута', 'минуты', 'минут')}`);
        }
        if (secs > 0 && days === 0 && hours === 0) { 
            parts.push(`${secs} ${declension(secs, 'секунда', 'секунды', 'секунд')}`);
        }
        

        if (parts.length === 0) {
            return '0 секунд';
        }
        
        return parts.join(' ');
    }
    
    /**
     * Склонение слов 
     */
    function declension(number, one, two, five) {
        const n = Math.abs(number) % 100;
        const n1 = n % 10;
        if (n > 10 && n < 20) return five;
        if (n1 > 1 && n1 < 5) return two;
        if (n1 === 1) return one;
        return five;
    }
    

    function formatCompact(seconds) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        
        if (hours > 0) {
            return `${hours}ч ${minutes}м ${secs}с`;
        } else if (minutes > 0) {
            return `${minutes}м ${secs}с`;
        } else {
            return `${secs}с`;
        }
    }
    
    function getStoredStats() {
        const defaultStats = { lastSession: null, totalTime: 0 };
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : defaultStats;
        } catch(e) {
            return defaultStats;
        }
    }
    
    function saveStats(stats) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    }
    
    function updateDisplay() {
        const stats = getStoredStats();
        const div = document.getElementById('sessionStats');
        if (!div) return;
        
        const currentDuration = Math.round((Date.now() - sessionStart) / 1000);
        const currentFormatted = formatCompact(currentDuration);
        const totalFormatted = formatTime(stats.totalTime);
        
        let html = `<span style="color:#0f0;">🎮 ТЕКУЩАЯ СЕССИЯ</span><br>`;
        html += `<span style="color:#fff; font-size:16px; font-weight:bold;">${currentFormatted}</span><br>`;
        html += `<span style="color:#888;">━━━━━━━━━━━━━━</span><br>`;
        html += `<span style="color:#ff0;">🏆 ВСЕГО:</span><br>`;
        html += `<span style="color:#fff; font-size:14px;">${totalFormatted}</span>`;
        
        if (stats.lastSession) {
            const lastFormatted = formatTime(stats.lastSession);
            html += `<br><span style="color:#888;">━━━━━━━━━━━━━━</span><br>`;
            html += `<span style="color:#fa0;">📊 ПОСЛЕДНЯЯ:</span><br>`;
            html += `<span style="color:#fff;">${lastFormatted}</span>`;
        }
        
        div.innerHTML = html;
    }
    

    window.addEventListener('beforeunload', function() {
        const duration = Math.round((Date.now() - sessionStart) / 1000);
        const stats = getStoredStats();
        
        stats.lastSession = duration;
        stats.totalTime = (stats.totalTime || 0) + duration;
        
        saveStats(stats);
    });
    
    updateDisplay();
    setInterval(updateDisplay, 1000);
})();
</script>

  <div id="sessionStats" style="
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: lime;
    font-family: monospace;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 5px;
    z-index: 9999;
    pointer-events: none;
">
    Загрузка...
</div>

<script>
(function() {
    // Ключ для localStorage
    const STORAGE_KEY = 'rpg_session_stats';
    
    // Засекаем начало сессии
    const sessionStart = Date.now();
    
    // Функция обновления отображения
    function updateDisplay() {
        const stats = getStoredStats();
        const div = document.getElementById('sessionStats');
        if (div) {
            if (stats.lastSession) {
                div.innerHTML = `🎮 Последняя сессия: ${stats.lastSession} сек<br>🏆 Всего сыграно: ${stats.totalTime} сек`;
            } else {
                div.innerHTML = `🎮 Это ваша первая сессия!`;
            }
        }
    }
    
    // Получить сохраненную статистику
    function getStoredStats() {
        const defaultStats = { lastSession: null, totalTime: 0 };
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : defaultStats;
        } catch(e) {
            return defaultStats;
        }
    }
    
    // Сохранить статистику
    function saveStats(stats) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    }
    
    // Обновить статистику при уходе со страницы
    window.addEventListener('beforeunload', function() {
        const duration = Math.round((Date.now() - sessionStart) / 1000);
        const stats = getStoredStats();
        
        stats.lastSession = duration;
        stats.totalTime = (stats.totalTime || 0) + duration;
        
        saveStats(stats);
    });
    
    // Показываем статистику сразу при загрузке
    updateDisplay();
    
    // Обновляем каждую секунду (опционально - показывает текущую длительность)
    let interval = setInterval(function() {
        const currentDuration = Math.round((Date.now() - sessionStart) / 1000);
        const div = document.getElementById('sessionStats');
        if (div && div.innerHTML.indexOf('Текущая') === -1) {
            const stats = getStoredStats();
            div.innerHTML = `🎮 Текущая: ${currentDuration} сек<br>🏆 Всего: ${stats.totalTime} сек`;
        }
    }, 1000);
})();
</script>
